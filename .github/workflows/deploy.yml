name: CI/CD - Build & Deploy AulasViolão

on:
  push:
    branches:
      - main

jobs:
  # ── JOB 1: Testes da Aplicação ──
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_sqlite, redis
          coverage: none

      - name: Install Backend Dependencies
        run: |
          cd backend
          composer install --no-interaction --prefer-dist

      - name: Run Backend Tests
        run: |
          cd backend
          php artisan test

  # ── JOB 2: Build & Push das Imagens para o GHCR ──
  build-and-push:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Converte o nome do repositório para minúsculas (exigência do GHCR)
      - name: Lowercase Repository Name
        id: string
        run: |
          echo "repo_name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. Build & Push: Backend Laravel
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ steps.string.outputs.repo_name }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Build & Push: Nginx Web Server
      - name: Build and Push Nginx Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/docker/nginx/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.string.outputs.repo_name }}/nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. Build & Push: Frontend Next.js (Otimizado Standalone)
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.string.outputs.repo_name }}/frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://api-aulasviolao.bigspacecreative.com.br/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── JOB 3: Atualização automática via SSH na VPS (Portainer CE / Docker) ──
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /var/www/digital-courses # <-- Altere para a pasta física do projeto na sua VPS
            git pull origin main
            
            # Autenticação silenciosa no GHCR na VPS
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # OPÇÃO A: Se estiver usando Docker Compose padrão na VPS:
            docker compose -f docker-compose.stack.yml pull
            docker compose -f docker-compose.stack.yml up -d
            
            # OPÇÃO B: Se estiver usando Docker Swarm na VPS (Descomente se necessário):
            # docker stack deploy -c docker-compose.stack.yml digital-courses
