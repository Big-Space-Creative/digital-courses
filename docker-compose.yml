services:
  # Aplicação Laravel (PHP-FPM)
  app:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    image: digital-courses-app
    container_name: digital-courses-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - backend_vendor:/var/www/vendor
      - ./backend/docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - digital-courses-network
    depends_on:
      - db
      - redis

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: digital-courses-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./backend/docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - digital-courses-network
    depends_on:
      - app

  # Frontend Next.js Otimizado
  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    image: digital-courses-frontend:latest
    container_name: digital-courses-frontend
    restart: unless-stopped
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      API_BASE_URL: "http://nginx/api/v1/"
    ports:
      - "3000:3000"
    depends_on:
      - app
    networks:
      - digital-courses-network

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: digital-courses-db
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - digital-courses-network

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: digital-courses-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - digital-courses-network

  # Mailpit — capturador de e-mails para desenvolvimento
  # UI: http://localhost:8025 | SMTP: porta 1025 (interna ao container)
  mailpit:
    image: axllent/mailpit:latest
    container_name: digital-courses-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    networks:
      - digital-courses-network

  # pgAdmin (UI para PostgreSQL)
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: digital-courses-pgadmin
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8080:80"
    networks:
      - digital-courses-network
    depends_on:
      - db

  # MinIO (S3 self-hosted)
  minio:
    image: minio/minio:latest
    container_name: digital-courses-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console
    command: server /data --console-address ":9001"
    networks:
      - digital-courses-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # MinIO Init — cria o bucket automaticamente na primeira execução
  # CORS é configurado via MINIO_API_CORS_ALLOW_ORIGIN no servidor MinIO
  minio-init:
    image: minio/minio:latest
    container_name: digital-courses-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing myminio/digital-courses-bucket &&
        echo 'MinIO init concluido.';
      "
    env_file:
      - ./backend/.env
    networks:
      - digital-courses-network
    restart: on-failure

networks:
  digital-courses-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  minio_data:
    driver: local
  backend_vendor:
    driver: local
  frontend_node_modules:
    driver: local
  frontend_next:
    driver: local
