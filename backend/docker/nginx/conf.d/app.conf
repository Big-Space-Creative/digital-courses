server {
    listen 80;
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/public;
    client_max_body_size 600M;

    # ── Headers de proxy reverso ──────────────────────────────────────────────
    # Quando o Traefik está na frente, ele insere X-Forwarded-Proto: https.
    # Esses headers fazem o Nginx repassar ao Laravel os valores corretos,
    # permitindo que o TrustProxies do Laravel gere URLs com HTTPS.
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host   $http_x_forwarded_host;

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;

        # SERVER_NAME uses $host to prevent empty string crashes
        fastcgi_param SERVER_NAME             $host;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }
}
