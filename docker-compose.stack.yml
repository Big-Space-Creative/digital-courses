version: '3.8'

services:
  # ── Backend PHP-FPM (Laravel Application) ──
  app:
    image: ghcr.io/big-space-creative/digital-courses/backend:latest
    container_name: digital-courses-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - app_storage:/var/www/storage
      - app_bootstrap_cache:/var/www/bootstrap/cache
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_NAME=${ADMIN_NAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_STORE=${CACHE_STORE}
      - SESSION_DRIVER=${SESSION_DRIVER}
      - SESSION_LIFETIME=${SESSION_LIFETIME}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FILESYSTEM_DISK=${FILESYSTEM_DISK}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_BUCKET=${AWS_BUCKET}
      - AWS_USE_PATH_STYLE_ENDPOINT=${AWS_USE_PATH_STYLE_ENDPOINT}
      - AWS_ENDPOINT=${AWS_ENDPOINT}
      - MAIL_MAILER=${MAIL_MAILER}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME}
      - L5_SWAGGER_GENERATE_ALWAYS=false
      - SWAGGER_ENABLED=false
    networks:
      - digital-courses-network
      - network_swarm_public

  # ── Nginx Web Server (Proxy do Laravel) ──
  nginx:
    image: ghcr.io/big-space-creative/digital-courses/nginx:latest
    container_name: digital-courses-nginx
    restart: unless-stopped
    networks:
      - digital-courses-network
      - network_swarm_public
    deploy:
      labels:
        - "traefik.enable=true"
        # HTTPS Router
        - "traefik.http.routers.dc-api.rule=Host(`api-aulasviolao.bigspacecreative.com.br`)"
        - "traefik.http.routers.dc-api.entrypoints=websecure"
        - "traefik.http.routers.dc-api.tls.certresolver=letsencrypt"
        - "traefik.http.services.dc-api.loadbalancer.server.port=80"
        # Redirecionamento HTTP -> HTTPS
        - "traefik.http.routers.dc-api-http.rule=Host(`api-aulasviolao.bigspacecreative.com.br`)"
        - "traefik.http.routers.dc-api-http.entrypoints=web"
        - "traefik.http.routers.dc-api-http.middlewares=redirect-to-https"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
        # Limite de Upload (Vídeos de aulas)
        - "traefik.http.middlewares.dc-api-buffering.buffering.maxRequestBodyBytes=629145600" # 600MB
        - "traefik.http.routers.dc-api.middlewares=dc-api-buffering"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dc-api.rule=Host(`api-aulasviolao.bigspacecreative.com.br`)"
      - "traefik.http.routers.dc-api.entrypoints=websecure"
      - "traefik.http.routers.dc-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.dc-api.loadbalancer.server.port=80"
      - "traefik.http.routers.dc-api-http.rule=Host(`api-aulasviolao.bigspacecreative.com.br`)"
      - "traefik.http.routers.dc-api-http.entrypoints=web"
      - "traefik.http.routers.dc-api-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.dc-api-buffering.buffering.maxRequestBodyBytes=629145600"
      - "traefik.http.routers.dc-api.middlewares=dc-api-buffering"

  # ── Frontend Next.js (Node.js) ──
  frontend:
    image: ghcr.io/big-space-creative/digital-courses/frontend:latest
    container_name: digital-courses-frontend
    restart: unless-stopped
    networks:
      - digital-courses-network
      - network_swarm_public
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - API_BASE_URL=http://nginx/api/v1/
      - PORT=3000
    deploy:
      labels:
        - "traefik.enable=true"
        # HTTPS Router
        - "traefik.http.routers.dc-frontend.rule=Host(`aulasviolao.bigspacecreative.com.br`)"
        - "traefik.http.routers.dc-frontend.entrypoints=websecure"
        - "traefik.http.routers.dc-frontend.tls.certresolver=letsencrypt"
        - "traefik.http.services.dc-frontend.loadbalancer.server.port=3000"
        # Redirecionamento HTTP -> HTTPS
        - "traefik.http.routers.dc-frontend-http.rule=Host(`aulasviolao.bigspacecreative.com.br`)"
        - "traefik.http.routers.dc-frontend-http.entrypoints=web"
        - "traefik.http.routers.dc-frontend-http.middlewares=redirect-to-https"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dc-frontend.rule=Host(`aulasviolao.bigspacecreative.com.br`)"
      - "traefik.http.routers.dc-frontend.entrypoints=websecure"
      - "traefik.http.routers.dc-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.dc-frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.dc-frontend-http.rule=Host(`aulasviolao.bigspacecreative.com.br`)"
      - "traefik.http.routers.dc-frontend-http.entrypoints=web"
      - "traefik.http.routers.dc-frontend-http.middlewares=redirect-to-https"

networks:
  # Rede de ponte privada interna à stack
  digital-courses-network:
    driver: bridge
  
  # Rede overlay externa do Docker Swarm da VPS
  network_swarm_public:
    external: true
    name: network_swarm_public

volumes:
  app_storage:
    driver: local
  app_bootstrap_cache:
    driver: local
